<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: sans-serif; fill: #2c2c2a; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; }
    .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; }
    .amber-fill  { fill: #FAEEDA; stroke: #854F0B; }
    .gray-fill   { fill: #F1EFE8; stroke: #5F5E5A; }
    .teal-text   { fill: #085041; }
    .amber-text  { fill: #633806; }
    .gray-text   { fill: #444441; }
    .dim         { stroke: #888780; }
  </style>

  <text class="th" x="170" y="28" text-anchor="middle">Top view (cross-section)</text>
  <text class="th" x="490" y="28" text-anchor="middle">Side view (profile)</text>

  <!-- TOP VIEW -->
  <circle cx="170" cy="230" r="130" class="amber-fill" stroke-width="0.5"/>
  <circle cx="170" cy="230" r="100" class="amber-fill" stroke-width="0.5"/>
  <circle cx="170" cy="230" r="70"  class="amber-fill" stroke-width="0.5"/>
  <circle cx="170" cy="230" r="42"  class="teal-fill"  stroke-width="1"/>
  <text class="ts teal-text" x="170" y="226" text-anchor="middle">BHE</text>
  <text class="ts teal-text" x="170" y="241" text-anchor="middle">D₀/2</text>

  <line x1="170" y1="230" x2="295" y2="230" class="dim" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="224" y="218" text-anchor="middle">rn</text>

  <text class="ts" x="170" y="84" text-anchor="middle">radial nodes</text>
  <line x1="170" y1="88" x2="170" y2="98" class="dim" stroke-width="0.8" marker-end="url(#arrow)" fill="none"/>

  <!-- SIDE VIEW -->
  <rect x="360" y="45"  width="220" height="50"  rx="4" class="gray-fill"  stroke-width="0.5"/>
  <text class="ts gray-text" x="470" y="74" text-anchor="middle">upper layers</text>

  <rect x="440" y="95"  width="140" height="270" rx="4" class="amber-fill" stroke-width="0.5"/>
  <text class="ts amber-text" x="510" y="233" text-anchor="middle">ground</text>

  <rect x="360" y="95"  width="80"  height="270" rx="4" class="teal-fill"  stroke-width="0.5"/>
  <text class="ts teal-text" x="400" y="233" text-anchor="middle">BHE</text>

  <rect x="360" y="365" width="220" height="50"  rx="4" class="gray-fill"  stroke-width="0.5"/>
  <text class="ts gray-text" x="470" y="394" text-anchor="middle">lower layers</text>

  <line x1="600" y1="45" x2="600" y2="415" class="dim" stroke-width="0.8" marker-end="url(#arrow)" fill="none"/>
  <text class="ts" x="612" y="48"  text-anchor="start">surface</text>
  <text class="ts" x="612" y="415" text-anchor="start">deep</text>

  <!-- LEGEND -->
  <rect x="30"  y="450" width="14" height="14" rx="3" class="teal-fill"  stroke-width="0.5"/>
  <text class="ts" x="50"  y="462">BHE domain (radial + axial)</text>
  <rect x="250" y="450" width="14" height="14" rx="3" class="amber-fill" stroke-width="0.5"/>
  <text class="ts" x="270" y="462">Ground domain (radial + axial)</text>
  <rect x="480" y="450" width="14" height="14" rx="3" class="gray-fill"  stroke-width="0.5"/>
  <text class="ts" x="500" y="462">Axial only</text>
</svg>
